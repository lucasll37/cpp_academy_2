syntax = "proto3";

package mlinference.common;

// ============================================
// Enumerations
// ============================================

enum DataType {
    FLOAT32 = 0;
    FLOAT64 = 1;
    INT32   = 2;
    INT64   = 3;
    UINT8   = 4;
    BOOL    = 5;
    STRING  = 6;
    FLOAT16 = 7;
}

enum BackendType {
    BACKEND_UNKNOWN = 0;
    BACKEND_ONNX    = 1;
    BACKEND_PYTHON  = 2;
    // Future: BACKEND_TFLITE = 3; BACKEND_WASM = 4; etc.
}

enum WorkerStatus {
    WORKER_UNKNOWN      = 0;
    WORKER_INITIALIZING = 1;
    WORKER_READY        = 2;
    WORKER_BUSY         = 3;
    WORKER_DEGRADED     = 4;
    WORKER_OFFLINE      = 5;
}

// ============================================
// Tensor Types
// ============================================

// Core tensor representation for data exchange.
message Tensor {
    repeated int64 shape = 1; // int64 for large tensors / dynamic dims
    DataType dtype       = 2;
    bytes data           = 3;
}

// Describes the schema of a single tensor (metadata only, no data).
message TensorSpec {
    string name               = 1;
    repeated int64 shape      = 2; // -1 for dynamic dimensions
    DataType dtype            = 3;
    string description        = 4; // Human-readable description
    optional double min_value = 5; // Optional input constraint
    optional double max_value = 6; // Optional input constraint
    bool structured           = 7; // True for nested dict/list inputs (Python models)
}

// ============================================
// Model Metadata
// ============================================

// Complete description of a loaded model.
message ModelInfo {
    string model_id            = 1;
    string version             = 2;
    BackendType backend        = 3;

    // I/O schema
    repeated TensorSpec inputs  = 4;
    repeated TensorSpec outputs = 5;

    // Descriptive metadata
    string description          = 6;
    string author               = 7;
    int64 created_at_unix       = 8;
    map<string, string> tags    = 9;

    // Runtime metadata (populated after load)
    string model_path           = 10;
    int64 loaded_at_unix        = 11;
    int64 memory_usage_bytes    = 12;
    bool is_warmed_up           = 13;
}

// ============================================
// Worker Infrastructure
// ============================================

message WorkerCapabilities {
    bool supports_gpu                  = 1;
    uint32 num_gpus                    = 2;
    uint32 num_cpu_cores               = 3;
    uint64 total_memory_mb             = 4;
    uint64 available_memory_mb         = 5;
    repeated string supported_backends = 6;
    repeated string onnx_providers     = 7;
    string onnx_runtime_version        = 8;
}

message WorkerMetrics {
    uint64 total_requests        = 1;
    uint64 successful_requests   = 2;
    uint64 failed_requests       = 3;
    uint32 active_requests       = 4;
    double avg_response_time_ms  = 5;
    double cpu_usage_percent     = 6;
    double memory_usage_percent  = 7;
    double gpu_usage_percent     = 8;
    int64 uptime_seconds         = 9;
}
