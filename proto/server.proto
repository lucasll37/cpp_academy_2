syntax = "proto3";

package miia.server;

import "common.proto";
import "google/protobuf/struct.proto";

// ============================================
// Worker Service
// ============================================

service WorkerService {

    // --- Inference ---
    rpc Predict       (PredictRequest)       returns (PredictResponse);
    rpc BatchPredict  (BatchPredictRequest)  returns (BatchPredictResponse);
    rpc PredictStream (stream PredictRequest) returns (stream PredictResponse);

    // --- Model lifecycle ---
    rpc LoadModel     (LoadModelRequest)     returns (LoadModelResponse);
    rpc UnloadModel   (UnloadModelRequest)   returns (UnloadModelResponse);

    // --- Model introspection ---
    rpc ListModels    (ListModelsRequest)    returns (ListModelsResponse);
    rpc GetModelInfo  (GetModelInfoRequest)  returns (GetModelInfoResponse);
    rpc ValidateModel (ValidateModelRequest) returns (ValidateModelResponse);
    rpc WarmupModel   (WarmupModelRequest)   returns (WarmupModelResponse);

    // --- Worker observability ---
    rpc GetStatus     (GetStatusRequest)     returns (GetStatusResponse);
    rpc GetMetrics    (GetMetricsRequest)    returns (GetMetricsResponse);
    rpc HealthCheck   (HealthCheckRequest)   returns (HealthCheckResponse);

    // --- File discovery ---
    rpc ListAvailableModels (ListAvailableModelsRequest) returns (ListAvailableModelsResponse);
}

// ============================================
// Inference
// ============================================

// PredictRequest e PredictResponse agora usam google.protobuf.Struct para
// inputs e outputs, permitindo campos arbitrários, aninhados e de tipos
// variados (número, string, bool, lista, objeto) — equivalente a JSON.
//
// Exemplo de payload inputs:
//   {
//     "speed":    12.5,
//     "position": { "x": 1.0, "y": 2.0 },
//     "history":  [1.0, 2.0, 3.0],
//     "mode":     "combat",
//     "active":   true
//   }

message PredictRequest {
    string                    model_id  = 1;
    google.protobuf.Struct    inputs    = 2;
    map<string, string>       metadata  = 3;
}

message PredictResponse {
    bool                      success            = 1;
    google.protobuf.Struct    outputs            = 2;
    double                    inference_time_ms  = 3;
    string                    error_message      = 4;
    map<string, string>       metadata           = 5;
}

message BatchPredictRequest {
    string model_id                  = 1;
    repeated PredictRequest requests = 2;
}

message BatchPredictResponse {
    bool success                       = 1;
    repeated PredictResponse responses = 2;
    double total_time_ms               = 3;
    string error_message               = 4;
}

// ============================================
// Model Lifecycle
// ============================================

message LoadModelRequest {
    string model_id   = 1;
    string model_path = 2;
    string version    = 3;

    // Optional: force a specific backend instead of auto-detection by extension
    miia.common.BackendType force_backend = 4;

    // Optional: arbitrary config passed to the backend (e.g. Python class name)
    map<string, string> backend_config = 5;
}

message LoadModelResponse {
    bool success                            = 1;
    miia.common.ModelInfo model_info = 2;
    string error_message                    = 3;
}

message UnloadModelRequest {
    string model_id = 1;
}

message UnloadModelResponse {
    bool success   = 1;
    string message = 2;
}

// ============================================
// Model Introspection
// ============================================

message ListModelsRequest {}

message ListModelsResponse {
    repeated miia.common.ModelInfo models = 1;
}

message GetModelInfoRequest {
    string model_id = 1;
}

message GetModelInfoResponse {
    bool success                            = 1;
    miia.common.ModelInfo model_info = 2;
    ModelRuntimeMetrics metrics             = 3;
    string error_message                    = 4;
}

// Dry-run validation: checks if a model file is loadable without
// actually allocating runtime resources.
message ValidateModelRequest {
    string model_path                            = 1;
    miia.common.BackendType force_backend = 2;
}

message ValidateModelResponse {
    bool valid                             = 1;
    miia.common.BackendType backend = 2;
    repeated string warnings               = 3;
    string error_message                   = 4;

    // Schema preview (if parseable without full load)
    repeated miia.common.TensorSpec inputs  = 5;
    repeated miia.common.TensorSpec outputs = 6;
}

// Run N dummy inferences to warm up JIT / caches.
message WarmupModelRequest {
    string model_id  = 1;
    uint32 num_runs  = 2;
}

message WarmupModelResponse {
    bool success          = 1;
    uint32 runs_completed = 2;
    double avg_time_ms    = 3;
    double min_time_ms    = 4;
    double max_time_ms    = 5;
    string error_message  = 6;
}

// ============================================
// Per-model runtime metrics
// ============================================

message ModelRuntimeMetrics {
    uint64 total_inferences        = 1;
    uint64 failed_inferences       = 2;
    double avg_inference_time_ms   = 3;
    double min_inference_time_ms   = 4;
    double max_inference_time_ms   = 5;
    double p95_inference_time_ms   = 6;
    double total_inference_time_ms = 7;
    int64  last_used_at_unix       = 8;
    int64  loaded_at_unix          = 9;
    double p99_inference_time_ms   = 10;
}

// ============================================
// Worker Observability
// ============================================

message GetStatusRequest {}

message GetStatusResponse {
    string worker_id                                   = 1;
    miia.common.WorkerStatus status             = 2;
    miia.common.WorkerCapabilities capabilities = 3;
    miia.common.WorkerMetrics metrics           = 4;
    repeated string loaded_model_ids                   = 5;
}

message GetMetricsRequest {}

message GetMetricsResponse {
    miia.common.WorkerMetrics worker_metrics    = 1;
    map<string, ModelRuntimeMetrics> per_model_metrics = 2;
}

message HealthCheckRequest {}

message HealthCheckResponse {
    bool healthy   = 1;
    string message = 2;
}

// ============================================
// File Discovery
// ============================================

message ListAvailableModelsRequest {
    string directory = 1;
}

message AvailableModel {
    string filename                        = 1;
    string path                            = 2;
    string extension                       = 3;
    miia.common.BackendType backend = 4;
    int64  file_size_bytes                 = 5;
    bool   is_loaded                       = 6;
    string loaded_as                       = 7;
}

message ListAvailableModelsResponse {
    repeated AvailableModel models = 1;
    string directory               = 2;
}
